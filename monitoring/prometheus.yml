global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-site'
    static_configs:
      - targets: ['api-site:3011']

  - job_name: 'api-cliente'
    static_configs:
      - targets: ['api-cliente:3020']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
