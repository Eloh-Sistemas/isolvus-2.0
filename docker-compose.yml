services:
  api-site:
    build: ./isolvus.api.site
    ports:
      - "3011:3011"
    env_file:
      - ./isolvus.api.site/.env
    environment:
      - ORACLE_CLIENT_DIR=/opt/oracle/instantclient_21_21
    volumes:
      - ./isolvus.api.site/arquivodeintegracaofornecedor:/app/arquivodeintegracaofornecedor
      - ./isolvus.api.site/src/documentos:/app/src/documentos
      - ./isolvus.api.site/src/remessas:/app/src/remessas
      - ./isolvus.api.site/src/certificados:/app/src/certificados
      - ./isolvus.api.site/src/midias:/app/src/midias
    restart: unless-stopped

  api-cliente:
    build: ./isolvus.api.cliente
    ports:
      - "3020:3020"
    env_file:
      - ./isolvus.api.cliente/.env
    environment:
      - ORACLE_CLIENT_DIR=/opt/oracle/instantclient_21_21
    restart: unless-stopped

  site:
    build: ./isolvus.site
    ports:
      - "80:80"
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    restart: unless-stopped

volumes:
  grafana_data:
